<!DOCTYPE html>
<html>
<head>
<title>Feedback Analyzer</title>
</head>
<body>
<h2>Feedback Form</h2>
<input type="text" id="name" placeholder="Enter Name"><br><br>
<input type="email" id="email" placeholder="Enter Email"><br><br>
<select id="type">
<option value="">Select Feedback Type</option>
<option value="Bug">Bug</option>
<option value="Suggestion">Suggestion</option>
<option value="Appreciation">Appreciation</option>
</select><br><br>
<textarea id="feedback" placeholder="Enter Feedback"></textarea><br><br>
<button id="submitBtn">Submit Feedback</button>
<p id="error"></p>
<hr>
<p>Total Feedback: <span id="count">0</span></p>
<div id="feedbackContainer"></div>
<script src="./Assignment3.js"></script>
</body>
</html>
