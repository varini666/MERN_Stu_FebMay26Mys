<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Project V3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss.com"></script>
    <script>
    tailwind.config = {
        darkMode: 'class'
    }
</script>
</head>

<body class="bg-gray-100 ">

    <!-- 1. Scroll Progress -->
    <div id="scroll-progress" class="fixed top-0 left-0 h-1 bg-blue-500 w-0 z-50"></div>

    <!-- NAVBAR -->
    <nav class="sticky top-0 bg-white shadow z-40">
        <div class="flex justify-between px-6 py-4">

            <ul class="flex gap-6">
                <li><a href="#home" class="nav-link font-bold">Home</a></li>
                <li><a href="#skills" class="nav-link font-bold">Skills</a></li>
                <li><a href="#projects" class="nav-link font-bold">Projects</a></li>
                <li><a href="#contact" class="nav-link font-bold">Contact</a></li>
            </ul>

            <!-- 13. Theme Toggle -->
            <button id="theme-toggle" class="bg-gray-200 px-4 py-2 rounded">
                Theme
            </button>

        </div>
    </nav>

    <!-- 14. Greeting -->
    <p id="greeting" class="text-center mt-4 font-bold text-lg"></p>

    <!-- HERO -->
    <section id="home" class="min-h-screen flex items-center justify-center flex-col gap-4">

        <h1 class="text-5xl font-bold">Varini P</h1>

        <!-- 9. Typing Animation -->
        <h2 class="text-xl">
            I am <span id="typing-text" class="text-blue-500"></span>
        </h2>
        <!-- IMAGE -->
    <div>
        <img src="myphoto.jpg.jpeg" alt="My Photo"
            class="w-60 h-60 object-cover rounded-full shadow-lg">
    </div>

    </section>

    <!-- SKILLS -->
    <section id="skills" class="py-20 px-8 bg-white">

        <h2 class="text-3xl text-center mb-6">Skills</h2>

        <!-- 10. Skill Filter -->
        <div class="flex justify-center gap-4 mb-6">
            <button data-category="all" class="filter-btn">All</button>
            <button data-category="frontend" class="filter-btn">Frontend</button>
            <button data-category="backend" class="filter-btn">Backend</button>
            <button data-category="tools" class="filter-btn">Tools</button>
        </div>

        <div id="skills-container" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>

    </section>

    <!-- PROJECTS -->
    <section id="projects" class="py-20 px-8">

        <h2 class="text-3xl text-center mb-6">Projects</h2>

        <!-- 4. Search -->
        <input id="search-input" type="text" placeholder="Search projects..."
            class="block mx-auto mb-4 border px-4 py-2">

        <!-- 7. Sort -->
        <select id="sort-select" class="block mx-auto mb-4 border px-4 py-2">
            <option value="default">Sort</option>
            <option value="az">A-Z</option>
            <option value="za">Z-A</option>
        </select>

        <!-- 6. Category Filter -->
        <div class="flex justify-center gap-4 mb-4">
            <button data-category="all" class="category-btn">All</button>
            <button data-category="frontend" class="category-btn">Frontend</button>
            <button data-category="backend" class="category-btn">Backend</button>
        </div>

        <!-- 5. Result Count -->
        <p id="result-count" class="text-center mb-4">0 projects found</p>

        <!-- Projects -->
        <div id="projects-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

    </section>

    <!-- 12. Recently Viewed -->
    <section class="py-10 px-8 bg-white">
        <h2 class="text-2xl text-center mb-4">Recently Viewed</h2>
        <div id="recent-projects" class="flex flex-wrap gap-4 justify-center"></div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="py-20 px-8">

        <h2 class="text-3xl text-center mb-6">Contact</h2>

        <!-- 11. Auto Save -->
        <form id="contact-form" class="max-w-md mx-auto">

            <input id="name" type="text" placeholder="Name"
                class="w-full mb-3 border px-3 py-2">

            <input id="email" type="email" placeholder="Email"
                class="w-full mb-3 border px-3 py-2">

            <textarea id="message" placeholder="Message"
                class="w-full mb-3 border px-3 py-2"></textarea>

        </form>

    </section>

    <!-- 15. Location -->
    <p id="location-message" class="text-center font-bold mb-6"></p>

    <!-- 3. Back to Top -->
    <button id="back-to-top"
        class="fixed bottom-6 right-6 bg-blue-500 text-white px-4 py-2 hidden">
        ↑ Top
    </button>

    <!-- JS -->
    <script src="./js/features/scroll-progress.js"></script>
    <script src="./js/features/scroll-spy.js"></script>
    <script src="./js/features/back-to-top.js"></script>

    <script src="./js/data/projects.js"></script>
    <script src="./js/features/projects-render.js"></script>
    <script src="./js/features/project-search.js"></script>
    <script src="./js/features/project-filter.js"></script>
    <script src="./js/features/project-sort.js"></script>
    <script src="./js/features/typing.js"></script>

    <script src="./js/data/skill.js"></script>
    <script src="./js/features/skill-render.js"></script>
    <script src="./js/features/skills-filter.js"></script>
    <script src="./js/features/form-autosave.js"></script>
    <script src="./js/features/recent-project.js"></script>
    <script src="./js/features/theme.js"></script>

    <script src="./js/main.js"></script>

</body>

</html>
