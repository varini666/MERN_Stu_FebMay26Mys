<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position:relative</title>
    <style>
        nav {
            position: sticky;
            width: 100%;
            top: 0;
            background-color: plum;
            padding: 15px;
            z-index: 1000;
        }

        nav a {
            color: black;
            margin: 20px;
            text-decoration: underline;
            transition: 0.3s;
        }

        nav a:hover {
            color: red;
            font-size: 18px;
        }

        .section {
            height: 600px;
            padding: 20px;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: rgb(90, 129, 145);
            color: black;
            text-align: center;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            transition: 0.4s;
        }

        button:hover {
            background-color: red;
            transform: scale(1.2);
        }

        .ball {
            width: 50px;
            height: 50px;
            background: black;
            border-radius: 50%;
            position: relative;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from {
                top: 0px;
            }

            to {
                top: 200px;
            }
        }

        .box1 {
            width: 150px;
            height: 150px;
            background: blueviolet;
            position: relative;
            z-index: 1;
            opacity: 80%;
        }

        .box2 {
            width: 150px;
            height: 150px;
            background: midnightblue;
            position: relative;
            top: -100px;
            left: 50px;
            z-index: 2;
            opacity: 80%;
        }

        .home {
            position: relative;
            width: 300px;
            height: 250px;
            background-color: greenyellow;
            border: 5px solid black;
            top: -29px;
            margin: 50px auto;
        
        }

        .topbox {
            position: relative;
            width: 400px;
            height: 30px;
            background-color: orangered;
            border: 5px solid black;
            left: 600px;
            top: 25px;
            right: 800px;
        }

        .door {
            position: relative;
            width: 80px;
            height: 152px;
            background-color: #3f51b5;
            border: 5px solid black;
            bottom: -93px;
            left: 104px;
        }

        .leftbox {
            position: relative;
            width: 50px;
            height: 100px;
            background-color: yellow;
            border: 5px solid black;
            top: -120px;
            left: 30px;
        }

        .rightbox {
            position: relative;
            width: 45px;
            height: 70px;
            background-color: purple;
            border: 5px solid black;
            top: -200px;
            left: 230px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Login</a>
        <a href="#">Register</a>
    </nav>
    <div class="section">
        <h2>Button Hover</h2>
        <button>Hover Me</button>
        <h2>Bouncing Ball</h2>
        <div class="ball"></div>
        <h2>Z-Index Example</h2>
        <div class="box1"></div>
        <div class="box2"></div>
        <h2>Relative:position</h2>
        <div class="topbox"></div>
        <div class="home">
            <div class="door"></div>
            <div class="leftbox"></div>
            <div class="rightbox"></div>
        </div>
    </div>
    <footer>
        Fixed Footer
    </footer>
</body>

</html>
