<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TailWind A2</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100">
<div class="bg-gray-50 shadow m-6 p-6 rounded-lg">
    <div class="flex justify-between items-center">
        <div>
            <h4 class="text-gray-500">Active Users</h4>
            <h2 class="text-xl font-bold tracking-wide">12,480</h2>
            <span class="inline-flex items-center bg-green-100 text-green-700 px-3 py-1 rounded-full">Up
            </span>
        </div>
        <div>
            <h4 class="text-gray-500">Request/Min</h4>
            <h2 class="text-xl font-bold tracking-wide">1,240</h2>
            <span class="inline-flex items-center bg-blue-100 text-blue-700 px-3 py-1 rounded-full">Stable
            </span>
        </div>

        <div>
            <h4 class="text-gray-500">Error Rate</h4>
            <h2 class="text-xl font-bold tracking-wide">2.1%</h2>
            <span class="inline-flex items-center bg-red-100 text-red-700 px-3 py-1 rounded-full">Down
            </span>
        </div>

        <button class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg shadow">
            Download Report
        </button>

    </div>
    <div class="bg-red-100 border-l-4 border-red-500 p-3 mt-6 rounded">
        <p class="leading-relaxed">
            Scheduled maintenance tonight may briefly affect dashboard output.
        </p>
    </div>

</div>

</body>
</html>
