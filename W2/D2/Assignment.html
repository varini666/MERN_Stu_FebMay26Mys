<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TailWind A1</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="w-100 h-130 p-2 m-50 shadow-full">
        <h2 class="font-bold text-xl bg-black-2">Notification-center</h2>
        <span class="inline-flex items-center bg-blue-100 text-blue-800  rounded-full px-3 py-2">3 New</span>

        <div class="p-3">
        <h3 class="font-bold bg-red-100 border-l-4 border-red-500 w-80 h-20 ">Action required</h3>
        <p class="bg-red-100 border-l-4 border-red-500 w-80 h-20 shadow">Your last payment attempt failed.Please update
            your
            payment method
            to avoid service interruption </p>
        </div>
    <div class="p-3">
    <h3 class="font-bold bg-yellow-100 border-l-4 border-yellow-500 w-80 h-20 ">Maintenance Notice</h3>
    <p class="bg-yellow-100 border-l-4 border-yellow-500 w-80 h-20 shadow">This system will undergo maintenance this
        tonight.
        Some
        features may be temporarily unavailable</p>
        </div>
    <div class="flex gap-5">
        <button class="bg-blue-500 hover:bg-green-600 text-white px-6 py-4 m-3 rounded-lg shadow">View All</button>

        <div class="flex gap-5">
            <button class="bg-white-500 hover:bg-gray-600 text-black px-6 py-4 m-3 rounded-lg shadow">Dismiss</button>
        </div>
    </div>
    </div>
    
    
</body>

</html>
