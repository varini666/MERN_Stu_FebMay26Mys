<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saving & reading the session storage</title>
</head>
<body>
    <input type="text" id="themeInput" placeholder="Enter theme e.g light/dark">
